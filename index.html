<html>
<style>
    :root {
        --vegetable-px: 37px;
        --col-333: #334455;
        --col-aaa: #aabbcc;
        --col-eee: #e0e8ff;
        color : var(--col-333)
    }

    h1 {
        text-align: center;
        margin: 5px;
    }

    .vegetables-wrap {
        height: var(--vegetable-px);
        margin: 0px 5px;
        background-color: var(--col-eee);
    }

    .vegetables-left,
    .vegetables-right {
        height: var(--vegetable-px);
        text-align: center;
        line-height: var(--vegetable-px);
        padding: 0 15px;
    }

    .vegetables-left {
        float: left;
    }

    .vegetables-right {
        float: right;
    }

    #crazy-wrap {
        margin: 15px 30px 0px 30px
    }
    a {
        color:var(--col-333);
        text-decoration: underline dotted green;
        transition: all 0.5s ease;
    }
    a:hover {
        text-decoration:none;
        color: green;
        cursor: pointer;
    }
    .lt-box {
        width: 200px;
        height:80px;
        background-color: var(--col-eee);
        padding : 15px;
        margin: 8px;
    }
    .able-click {
        background-color: var(--col-eee);
        transition: all 0.5s ease;
    }
    .able-click:hover {
        background-color: var(--col-aaa);
        transition: all 0.5s ease;
        cursor: pointer;
    }
</style>
<script type="module" src="main.js"></script>

<head>
    <title id="title"></title>
</head>
<body>
    <div class="vegetables-wrap">
        <div class="vegetables-left able-click" onclick="update('System.index')">首页</div>
        <div class="vegetables-left able-click" onclick="update(1)">wiki</div>
        <div class="vegetables-left able-click" onclick="update(2)">文章</div>
        <div class="vegetables-left able-click">网站</div>
        <div class="vegetables-left able-click">444</div>
        <div class="vegetables-left able-click">555</div>
        <div class="vegetables-right able-click">
            <input type="text" id="vr-input"/>
            <input type="button" id="vr-button" value="启动！"/>
        </div>
    </div>
    <div id="crazy-wrap"></div>
</body>

</html>
